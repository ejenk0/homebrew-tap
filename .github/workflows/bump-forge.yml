name: Bump forge

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch: {}

concurrency:
  group: bump-forge
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: Homebrew/actions/setup-homebrew@main

      - name: Link workspace as a tap
        run: |
          taps_root="$(brew --repository)/Library/Taps/ejenk0"
          mkdir -p "$taps_root"
          ln -sf "$GITHUB_WORKSPACE" "$taps_root/homebrew-tap"

      - name: Find latest version via livecheck
        id: latest
        run: |
          set -euo pipefail
          # Reuse the formula's own livecheck block as the single source of truth.
          latest=$(brew livecheck --formula --quiet --json ejenk0/tap/forge \
            | jq -r '.[0].version.latest // empty')
          if [ -z "$latest" ]; then
            echo "livecheck returned no version" >&2
            exit 1
          fi
          echo "version=$latest" >> "$GITHUB_OUTPUT"

      - name: Compare with current formula
        id: cmp
        run: |
          cur=$(grep -m1 -oE 'forge-installer-[0-9.]+\.tar\.bz2' Formula/forge.rb \
            | sed -E 's/forge-installer-([0-9.]+)\.tar\.bz2/\1/')
          echo "current=$cur" >> "$GITHUB_OUTPUT"
          if [ "$cur" = "${{ steps.latest.outputs.version }}" ]; then
            echo "Already at latest: $cur"
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
          else
            echo "Bump needed: $cur -> ${{ steps.latest.outputs.version }}"
            echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Hash the new release
        if: steps.cmp.outputs.needs_bump == 'true'
        id: shasum
        run: |
          set -euo pipefail
          ver="${{ steps.latest.outputs.version }}"
          url="https://github.com/Card-Forge/forge/releases/download/forge-${ver}/forge-installer-${ver}.tar.bz2"
          curl -fsSL --retry 3 -o release.tar.bz2 "$url"
          sha=$(shasum -a 256 release.tar.bz2 | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          rm -f release.tar.bz2

      - name: Update formula file
        if: steps.cmp.outputs.needs_bump == 'true'
        run: |
          ver="${{ steps.latest.outputs.version }}"
          sed -i.bak -E "s|forge-[0-9.]+/forge-installer-[0-9.]+\.tar\.bz2|forge-${ver}/forge-installer-${ver}.tar.bz2|" Formula/forge.rb
          sed -i.bak -E 's|^  sha256 "[^"]+"|  sha256 "${{ steps.shasum.outputs.sha256 }}"|' Formula/forge.rb
          rm -f Formula/forge.rb.bak
          git --no-pager diff Formula/forge.rb

      - name: Validate
        if: steps.cmp.outputs.needs_bump == 'true'
        run: brew style Formula/forge.rb

      - name: Commit and push
        if: steps.cmp.outputs.needs_bump == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Formula/forge.rb
          git commit -m "forge ${{ steps.cmp.outputs.current }} -> ${{ steps.latest.outputs.version }}"
          # Authenticate the push explicitly: setup-homebrew's tap symlink means
          # checkout's persisted credentials aren't applied to this remote, so
          # git would otherwise prompt for a username and fail.
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
