name: Bump nativ

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch: {}

concurrency:
  group: bump-nativ
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: Homebrew/actions/setup-homebrew@main

      - name: Link workspace as a tap
        run: |
          taps_root="$(brew --repository)/Library/Taps/ejenk0"
          mkdir -p "$taps_root"
          ln -sf "$GITHUB_WORKSPACE" "$taps_root/homebrew-tap"

      - name: Find latest version via livecheck
        id: latest
        run: |
          set -euo pipefail
          # Reuse the cask's own livecheck block as the single source of truth.
          latest=$(brew livecheck --cask --quiet --json ejenk0/tap/nativ \
            | jq -r '.[0].version.latest // empty')
          if [ -z "$latest" ]; then
            echo "livecheck returned no version" >&2
            exit 1
          fi
          echo "version=$latest" >> "$GITHUB_OUTPUT"

      - name: Compare with current cask
        id: cmp
        run: |
          cur=$(grep -m1 '^  version' Casks/nativ.rb | sed -E 's/.*"([^"]+)".*/\1/')
          echo "current=$cur" >> "$GITHUB_OUTPUT"
          if [ "$cur" = "${{ steps.latest.outputs.version }}" ]; then
            echo "Already at latest: $cur"
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
          else
            echo "Bump needed: $cur -> ${{ steps.latest.outputs.version }}"
            echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Hash the new release
        if: steps.cmp.outputs.needs_bump == 'true'
        id: shasum
        run: |
          set -euo pipefail
          ver="${{ steps.latest.outputs.version }}"
          url="https://github.com/Blaizzy/nativ/releases/download/v${ver}/Nativ-${ver}.dmg"
          curl -fsSL --retry 3 -o release.dmg "$url"
          sha=$(shasum -a 256 release.dmg | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          rm -f release.dmg

      - name: Update cask file
        if: steps.cmp.outputs.needs_bump == 'true'
        run: |
          sed -i.bak -E 's|^  version "[^"]+"|  version "${{ steps.latest.outputs.version }}"|' Casks/nativ.rb
          sed -i.bak -E 's|^  sha256 "[^"]+"|  sha256 "${{ steps.shasum.outputs.sha256 }}"|' Casks/nativ.rb
          rm -f Casks/nativ.rb.bak
          git --no-pager diff Casks/nativ.rb

      - name: Validate
        if: steps.cmp.outputs.needs_bump == 'true'
        run: brew style Casks/nativ.rb

      - name: Commit and push
        if: steps.cmp.outputs.needs_bump == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Casks/nativ.rb
          git commit -m "nativ ${{ steps.cmp.outputs.current }} -> ${{ steps.latest.outputs.version }}"
          # Authenticate the push explicitly: setup-homebrew's tap symlink means
          # checkout's persisted credentials aren't applied to this remote, so
          # git would otherwise prompt for a username and fail.
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
